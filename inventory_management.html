<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inventory Management System</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #1D9E75;
      --accent-light: #E1F5EE;
      --accent-dark: #0F6E56;
      --bg-primary: #ffffff;
      --bg-secondary: #f5f5f3;
      --bg-tertiary: #eeede8;
      --text-primary: #1a1a18;
      --text-secondary: #5f5e5a;
      --border: rgba(0,0,0,0.12);
      --border-md: rgba(0,0,0,0.22);
      --radius-md: 8px;
      --radius-lg: 12px;
      --font: system-ui, -apple-system, 'Segoe UI', sans-serif;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary: #1e1e1c;
        --bg-secondary: #282826;
        --bg-tertiary: #111110;
        --text-primary: #f0efe9;
        --text-secondary: #a0a09a;
        --border: rgba(255,255,255,0.10);
        --border-md: rgba(255,255,255,0.20);
        --accent-light: #04342C;
      }
    }

    body {
      font-family: var(--font);
      background: var(--bg-tertiary);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container { max-width: 960px; margin: 0 auto; }

    /* Topbar */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }
    .topbar h1 {
      font-size: 22px;
      font-weight: 500;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .topbar h1 i { color: var(--accent); font-size: 24px; }
    .controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

    /* Form elements */
    input[type="text"],
    input[type="number"],
    select {
      height: 36px;
      padding: 0 10px;
      font-size: 14px;
      font-family: var(--font);
      background: var(--bg-primary);
      color: var(--text-primary);
      border: 0.5px solid var(--border-md);
      border-radius: var(--radius-md);
      outline: none;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus,
    input[type="number"]:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(29,158,117,0.15);
    }
    select { cursor: pointer; }

    /* Stat cards */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
      margin-bottom: 1.5rem;
    }
    .stat {
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      padding: 0.75rem 1rem;
    }
    .stat .label { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
    .stat .value { font-size: 22px; font-weight: 500; color: var(--text-primary); }
    .stat .value.warn { color: #BA7517; }
    .stat .value.danger { color: #A32D2D; }

    /* Add form */
    .add-form {
      background: var(--bg-primary);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
    }
    .add-form h2 { font-size: 14px; font-weight: 500; color: var(--text-secondary); margin-bottom: 12px; }
    .form-row {
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1fr auto;
      gap: 8px;
      align-items: end;
    }
    .field label { font-size: 12px; color: var(--text-secondary); display: block; margin-bottom: 4px; }
    .field input, .field select { width: 100%; }

    .btn-add {
      height: 36px;
      padding: 0 16px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      font-size: 14px;
      font-family: var(--font);
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .btn-add:hover { background: var(--accent-dark); }

    /* Table */
    .table-wrap {
      background: var(--bg-primary);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; table-layout: fixed; font-size: 14px; }
    thead th {
      background: var(--bg-secondary);
      padding: 10px 12px;
      text-align: left;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      border-bottom: 0.5px solid var(--border);
      cursor: pointer;
      user-select: none;
    }
    thead th:hover { color: var(--text-primary); }
    thead th i { font-size: 12px; vertical-align: middle; margin-left: 2px; }
    tbody tr { border-bottom: 0.5px solid var(--border); transition: background 0.1s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--bg-secondary); }
    tbody td { padding: 10px 12px; color: var(--text-primary); }

    /* Badges */
    .badge {
      display: inline-block;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 99px;
      font-weight: 500;
    }
    .cat-electronics { background: #E6F1FB; color: #0C447C; }
    .cat-clothing    { background: #FBEAF0; color: #72243E; }
    .cat-food        { background: #EAF3DE; color: #3B6D11; }
    .cat-tools       { background: #FAEEDA; color: #633806; }
    .cat-other       { background: #F1EFE8; color: #444441; }

    @media (prefers-color-scheme: dark) {
      .cat-electronics { background: #042C53; color: #B5D4F4; }
      .cat-clothing    { background: #4B1528; color: #F4C0D1; }
      .cat-food        { background: #173404; color: #C0DD97; }
      .cat-tools       { background: #412402; color: #FAC775; }
      .cat-other       { background: #2C2C2A; color: #D3D1C7; }
    }

    /* Stock status */
    .stock-ok     { color: var(--text-primary); }
    .stock-low    { color: #BA7517; font-weight: 500; }
    .stock-out    { color: #A32D2D; font-weight: 500; }

    /* Row action buttons */
    .row-actions { display: flex; gap: 4px; }
    .btn-icon {
      background: none;
      border: 0.5px solid var(--border);
      border-radius: var(--radius-md);
      width: 28px; height: 28px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-secondary);
      font-size: 15px;
      transition: all 0.1s;
      padding: 0;
    }
    .btn-icon:hover { background: var(--bg-secondary); color: var(--text-primary); }
    .btn-icon.danger:hover { background: #FCEBEB; color: #A32D2D; border-color: #F09595; }
    .btn-icon.edit:hover   { background: var(--accent-light); color: var(--accent-dark); border-color: #5DCAA5; }

    /* Empty state */
    .empty {
      padding: 2.5rem;
      text-align: center;
      color: var(--text-secondary);
      font-size: 14px;
    }

    /* Inline edit row */
    .edit-row td { background: var(--accent-light) !important; }
    .edit-row input, .edit-row select { width: 100%; font-size: 13px; }

    /* Sort indicator active */
    .sort-active { color: var(--accent) !important; }

    /* Responsive */
    @media (max-width: 680px) {
      .form-row { grid-template-columns: 1fr 1fr; }
      table { font-size: 12px; }
      tbody td, thead th { padding: 8px 8px; }
      .controls input[type="text"] { width: 150px; }
    }
  </style>
</head>
<body>
<div class="container">

  <div class="topbar">
    <h1><i class="ti ti-package" aria-hidden="true"></i> Inventory</h1>
    <div class="controls">
      <input type="text" id="searchInput" placeholder="Search products…" oninput="render()" />
      <select id="catFilter" onchange="render()">
        <option value="">All categories</option>
        <option value="Electronics">Electronics</option>
        <option value="Clothing">Clothing</option>
        <option value="Food">Food</option>
        <option value="Tools">Tools</option>
        <option value="Other">Other</option>
      </select>
      <select id="stockFilter" onchange="render()">
        <option value="">All stock</option>
        <option value="low">Low stock</option>
        <option value="out">Out of stock</option>
      </select>
    </div>
  </div>

  <div class="stat-grid" id="stats"></div>

  <div class="add-form">
    <h2>Add new product</h2>
    <div class="form-row">
      <div class="field">
        <label for="newName">Product name</label>
        <input type="text" id="newName" placeholder="e.g. USB-C Cable" />
      </div>
      <div class="field">
        <label for="newCat">Category</label>
        <select id="newCat">
          <option value="Electronics">Electronics</option>
          <option value="Clothing">Clothing</option>
          <option value="Food">Food</option>
          <option value="Tools">Tools</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="field">
        <label for="newQty">Qty</label>
        <input type="number" id="newQty" min="0" placeholder="0" />
      </div>
      <div class="field">
        <label for="newPrice">Price (₱)</label>
        <input type="number" id="newPrice" min="0" step="0.01" placeholder="0.00" />
      </div>
      <button class="btn-add" onclick="addProduct()">
        <i class="ti ti-plus" aria-hidden="true"></i> Add
      </button>
    </div>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th style="width:30%" onclick="sortBy('name')">Product <i class="ti ti-selector" id="sort-name"></i></th>
          <th style="width:16%" onclick="sortBy('category')">Category <i class="ti ti-selector" id="sort-category"></i></th>
          <th style="width:12%" onclick="sortBy('qty')">Qty <i class="ti ti-selector" id="sort-qty"></i></th>
          <th style="width:14%" onclick="sortBy('price')">Price <i class="ti ti-selector" id="sort-price"></i></th>
          <th style="width:16%" onclick="sortBy('value')">Total Value <i class="ti ti-selector" id="sort-value"></i></th>
          <th style="width:12%">Actions</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
    <div id="emptyState" class="empty" style="display:none">
      <i class="ti ti-package-off" style="font-size:28px;display:block;margin-bottom:8px" aria-hidden="true"></i>
      No products found
    </div>
  </div>

</div>

<script>
  let products = [
    { id: 1, name: 'USB-C Charging Cable',   category: 'Electronics', qty: 120, price: 299 },
    { id: 2, name: 'Wireless Mouse',          category: 'Electronics', qty: 8,   price: 850 },
    { id: 3, name: 'Cotton T-Shirt (M)',      category: 'Clothing',    qty: 0,   price: 450 },
    { id: 4, name: 'Instant Noodles (pack)',  category: 'Food',        qty: 200, price: 35  },
    { id: 5, name: 'Flathead Screwdriver',    category: 'Tools',       qty: 25,  price: 180 },
    { id: 6, name: 'HDMI Cable 2m',           category: 'Electronics', qty: 3,   price: 399 },
    { id: 7, name: 'Cargo Shorts (L)',        category: 'Clothing',    qty: 15,  price: 680 },
  ];
  let nextId = 8;
  let sortKey = 'name';
  let sortDir = 1;
  let editId  = null;

  function catClass(c) { return 'cat-' + c.toLowerCase(); }

  function stockClass(qty) {
    if (qty === 0)  return 'stock-out';
    if (qty < 10)   return 'stock-low';
    return 'stock-ok';
  }

  function stockLabel(qty) {
    if (qty === 0)  return '⚠ Out';
    if (qty < 10)   return '↓ ' + qty;
    return qty;
  }

  function getFiltered() {
    const q   = document.getElementById('searchInput').value.toLowerCase();
    const cat = document.getElementById('catFilter').value;
    const st  = document.getElementById('stockFilter').value;

    return products.filter(p => {
      if (q && !p.name.toLowerCase().includes(q) && !p.category.toLowerCase().includes(q)) return false;
      if (cat && p.category !== cat) return false;
      if (st === 'low' && p.qty >= 10)  return false;
      if (st === 'out' && p.qty !== 0)  return false;
      return true;
    }).sort((a, b) => {
      let va = sortKey === 'value' ? a.qty * a.price : a[sortKey];
      let vb = sortKey === 'value' ? b.qty * b.price : b[sortKey];
      if (typeof va === 'string') return va.localeCompare(vb) * sortDir;
      return (va - vb) * sortDir;
    });
  }

  function renderStats() {
    const total    = products.length;
    const totalVal = products.reduce((s, p) => s + p.qty * p.price, 0);
    const low      = products.filter(p => p.qty > 0 && p.qty < 10).length;
    const out      = products.filter(p => p.qty === 0).length;
    document.getElementById('stats').innerHTML = `
      <div class="stat"><div class="label">Products</div><div class="value">${total}</div></div>
      <div class="stat"><div class="label">Total stock value</div><div class="value">₱${totalVal.toLocaleString()}</div></div>
      <div class="stat"><div class="label">Low stock</div><div class="value warn">${low}</div></div>
      <div class="stat"><div class="label">Out of stock</div><div class="value danger">${out}</div></div>
    `;
  }

  function sortBy(key) {
    if (sortKey === key) sortDir *= -1;
    else { sortKey = key; sortDir = 1; }
    render();
  }

  function render() {
    renderStats();

    ['name','category','qty','price','value'].forEach(k => {
      const el = document.getElementById('sort-' + k);
      if (!el) return;
      el.className = sortKey === k
        ? (sortDir === 1 ? 'ti ti-chevron-up sort-active' : 'ti ti-chevron-down sort-active')
        : 'ti ti-selector';
    });

    const rows  = getFiltered();
    const tbody = document.getElementById('tableBody');
    const empty = document.getElementById('emptyState');

    if (!rows.length) { tbody.innerHTML = ''; empty.style.display = ''; return; }
    empty.style.display = 'none';

    tbody.innerHTML = rows.map(p => {
      if (editId === p.id) {
        return `<tr class="edit-row">
          <td><input type="text" id="e-name" value="${p.name}" /></td>
          <td><select id="e-cat">
            ${['Electronics','Clothing','Food','Tools','Other'].map(c =>
              `<option${c === p.category ? ' selected' : ''}>${c}</option>`
            ).join('')}
          </select></td>
          <td><input type="number" id="e-qty" value="${p.qty}" min="0" style="width:64px" /></td>
          <td><input type="number" id="e-price" value="${p.price}" min="0" step="0.01" style="width:80px" /></td>
          <td>₱${(p.qty * p.price).toLocaleString()}</td>
          <td><div class="row-actions">
            <button class="btn-icon edit" onclick="saveEdit(${p.id})" title="Save" aria-label="Save">
              <i class="ti ti-check" aria-hidden="true"></i>
            </button>
            <button class="btn-icon" onclick="cancelEdit()" title="Cancel" aria-label="Cancel">
              <i class="ti ti-x" aria-hidden="true"></i>
            </button>
          </div></td>
        </tr>`;
      }
      return `<tr>
        <td style="font-weight:500">${p.name}</td>
        <td><span class="badge ${catClass(p.category)}">${p.category}</span></td>
        <td class="${stockClass(p.qty)}">${stockLabel(p.qty)}</td>
        <td>₱${p.price.toLocaleString()}</td>
        <td>₱${(p.qty * p.price).toLocaleString()}</td>
        <td><div class="row-actions">
          <button class="btn-icon edit" onclick="startEdit(${p.id})" title="Edit" aria-label="Edit ${p.name}">
            <i class="ti ti-edit" aria-hidden="true"></i>
          </button>
          <button class="btn-icon danger" onclick="deleteProduct(${p.id})" title="Delete" aria-label="Delete ${p.name}">
            <i class="ti ti-trash" aria-hidden="true"></i>
          </button>
        </div></td>
      </tr>`;
    }).join('');
  }

  function addProduct() {
    const name  = document.getElementById('newName').value.trim();
    const cat   = document.getElementById('newCat').value;
    const qty   = parseInt(document.getElementById('newQty').value)   || 0;
    const price = parseFloat(document.getElementById('newPrice').value) || 0;
    if (!name) { document.getElementById('newName').focus(); return; }
    products.push({ id: nextId++, name, category: cat, qty, price });
    document.getElementById('newName').value  = '';
    document.getElementById('newQty').value   = '';
    document.getElementById('newPrice').value = '';
    render();
  }

  function deleteProduct(id) {
    if (!confirm('Delete this product?')) return;
    products = products.filter(p => p.id !== id);
    if (editId === id) editId = null;
    render();
  }

  function startEdit(id) {
    editId = id;
    render();
    setTimeout(() => {
      const el = document.getElementById('e-name');
      if (el) el.focus();
    }, 50);
  }

  function cancelEdit() { editId = null; render(); }

  function saveEdit(id) {
    const p = products.find(x => x.id === id);
    if (!p) return;
    p.name     = document.getElementById('e-name').value.trim()         || p.name;
    p.category = document.getElementById('e-cat').value;
    p.qty      = parseInt(document.getElementById('e-qty').value)        || 0;
    p.price    = parseFloat(document.getElementById('e-price').value)    || 0;
    editId = null;
    render();
  }

  document.getElementById('newName').addEventListener('keydown', e => {
    if (e.key === 'Enter') addProduct();
  });

  render();
</script>
</body>
</html>
